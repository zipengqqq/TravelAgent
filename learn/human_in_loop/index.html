<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LangGraph 人机交互演示</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 20px;
            font-size: 28px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 20px;
            font-size: 18px;
            font-weight: bold;
        }

        .card-body {
            padding: 20px;
        }

        /* 聊天区域 */
        .chat-container {
            height: 400px;
            display: flex;
            flex-direction: column;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            margin-bottom: 15px;
            background: #f9f9f9;
        }

        .message {
            margin-bottom: 15px;
            padding: 12px 15px;
            border-radius: 8px;
            line-height: 1.5;
        }

        .message.human {
            background: #e3f2fd;
            margin-left: 20%;
        }

        .message.ai {
            background: #f5f5f5;
            margin-right: 20%;
        }

        .message-label {
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 5px;
            color: #666;
        }

        .input-area {
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            border-color: #667eea;
        }

        button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        button.approve {
            background: linear-gradient(135deg, #4caf50 0%, #45a049 100%);
        }

        button.reject {
            background: linear-gradient(135deg, #f44336 0%, #d32f2f 100%);
        }

        /* State 展示 */
        .state-container {
            height: 500px;
            overflow-y: auto;
        }

        .state-section {
            margin-bottom: 20px;
        }

        .state-section h3 {
            color: #333;
            font-size: 16px;
            margin-bottom: 10px;
            padding-bottom: 5px;
            border-bottom: 2px solid #667eea;
        }

        .plan-item {
            background: #f5f5f5;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 4px solid #667eea;
        }

        .plan-item.completed {
            border-left-color: #4caf50;
            background: #e8f5e9;
       -item.pending {
            }

        .plan border-left-color: #ff9800;
            background: #fff3e0;
        }

        .plan-item.active {
            border-left-color: #2196f3;
            background: #e3f2fd;
        }

        .plan-step {
            font-weight: bold;
            color: #333;
        }

        .plan-action {
            color: #666;
            margin: 5px 0;
        }

        .plan-status {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
        }

        .status-pending {
            background: #fff3e0;
            color: #ff9800;
        }

        .status-completed {
            background: #e8f5e9;
            color: #4caf50;
        }

        /* 控制按钮区域 */
        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #e0e0e0;
        }

        .hidden {
            display: none !important;
        }

        .info-text {
            color: #666;
            font-size: 14px;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 LangGraph 人机交互演示</h1>

        <div class="grid">
            <!-- 左侧：聊天界面 -->
            <div class="card">
                <div class="card-header">💬 对话</div>
                <div class="card-body">
                    <div class="chat-container">
                        <div class="messages" id="messages">
                            <div class="info-text">
                                输入您的旅行需求开始体验<br>
                                例如: "我想去日本旅行一周"
                            </div>
                        </div>
                        <div class="input-area">
                            <input type="text" id="userInput" placeholder="输入消息..." onkeypress="handleKeyPress(event)">
                            <button onclick="sendMessage()" id="sendBtn">发送</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 右侧：状态展示 -->
            <div class="card">
                <div class="card-header">📊 State 状态</div>
                <div class="card-body">
                    <div class="state-container" id="stateContainer">
                        <div class="info-text">等待输入...</div>
                    </div>

                    <!-- 批准/修改按钮 -->
                    <div class="action-buttons hidden" id="actionButtons">
                        <button class="approve" onclick="approve(true)">✅ 批准计划</button>
                        <button class="reject" onclick="showModifyModal()">✏️ 修改计划</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 修改计划弹窗 -->
    <div id="modifyModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000;">
        <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; border-radius: 12px; width: 90%; max-width: 500px;">
            <h3 style="margin-bottom: 15px;">✏️ 修改计划</h3>
            <div id="planEditor"></div>
            <div style="display: flex; gap: 10px; margin-top: 15px;">
                <button onclick="submitModification()">提交修改</button>
                <button onclick="closeModifyModal()" style="background: #666;">取消</button>
            </div>
        </div>
    </div>

    <script>
        // API 服务器地址 - 根据实际情况修改
        const API_BASE = 'http://localhost:8001';

        let currentSessionId = null;
        let currentPlan = [];

        // 发送消息
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const message = input.value.trim();
            if (!message) return;

            const sendBtn = document.getElementById('sendBtn');
            sendBtn.disabled = true;

            try {
                const response = await fetch(API_BASE + '/api/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({message, session_id: currentSessionId})
                });

                const data = await response.json();
                currentSessionId = data.session_id;

                // 更新界面
                updateMessages(data.messages);
                updateState(data.state);
                showActionButtons(data.waiting_for_approval);

                input.value = '';
            } catch (error) {
                alert('发送失败: ' + error.message);
            } finally {
                sendBtn.disabled = false;
            }
        }

        // 处理键盘事件
        function handleKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        // 更新消息
        function updateMessages(messages) {
            const container = document.getElementById('messages');
            container.innerHTML = messages.map(msg => `
                <div class="message ${msg.type}">
                    <div class="message-label">${msg.type === 'human' ? '👤 用户' : '🤖 AI'}</div>
                    <div>${msg.content}</div>
                </div>
            `).join('');
            container.scrollTop = container.scrollHeight;
        }

        // 更新状态显示
        function updateState(state) {
            const container = document.getElementById('stateContainer');
            const plan = state.plan || [];
            currentPlan = JSON.parse(JSON.stringify(plan)); // 深拷贝

            if (plan.length === 0) {
                container.innerHTML = '<div class="info-text">等待输入...</div>';
                return;
            }

            let planHtml = plan.map((item, index) => {
                let statusClass = 'pending';
                let statusText = '待处理';
                let itemClass = 'pending';

                if (item.status === 'completed') {
                    statusClass = 'completed';
                    statusText = '已完成';
                    itemClass = 'completed';
                } else if (index === state.current_step) {
                    statusText = '执行中';
                    itemClass = 'active';
                }

                return `
                    <div class="plan-item ${itemClass}">
                        <div class="plan-step">步骤 ${item.step}</div>
                        <div class="plan-action">${item.action}</div>
                        <span class="plan-status status-${statusClass}">${statusText}</span>
                    </div>
                `;
            }).join('');

            container.innerHTML = `
                <div class="state-section">
                    <h3>执行计划 (当前步骤: ${state.current_step})</h3>
                    ${planHtml}
                </div>
                <div class="state-section">
                    <h3>状态信息</h3>
                    <p><strong>用户批准:</strong> ${state.approved === null ? '待审核' : (state.approved ? '已批准' : '未批准')}</p>
                    <p><strong>用户输入:</strong> ${state.user_input || '无'}</p>
                </div>
            `;
        }

        // 显示/隐藏操作按钮
        function showActionButtons(show) {
            const buttons = document.getElementById('actionButtons');
            if (show) {
                buttons.classList.remove('hidden');
            } else {
                buttons.classList.add('hidden');
            }
        }

        // 批准/拒绝
        async function approve(approved) {
            try {
                const response = await fetch(API_BASE + '/api/approve', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        session_id: currentSessionId,
                        approved: approved,
                        modified_plan: null
                    })
                });

                const data = await response.json();

                // 更新界面
                updateMessages(data.messages);
                updateState(data.state);
                showActionButtons(data.waiting_for_approval);
            } catch (error) {
                alert('操作失败: ' + error.message);
            }
        }

        // 显示修改弹窗
        function showModifyModal() {
            const modal = document.getElementById('modifyModal');
            const editor = document.getElementById('planEditor');

            editor.innerHTML = currentPlan.map((item, index) => `
                <div style="margin-bottom: 10px; padding: 10px; background: #f5f5f5; border-radius: 8px;">
                    <strong>步骤 ${item.step}</strong>
                    <input type="text" value="${item.action}"
                        onchange="updatePlanAction(${index}, this.value)"
                        style="width: 100%; padding: 8px; margin-top: 5px; border: 1px solid #ddd; border-radius: 4px;">
                </div>
            `).join('');

            modal.style.display = 'block';
        }

        // 更新计划动作
        function updatePlanAction(index, value) {
            currentPlan[index].action = value;
        }

        // 提交修改
        async function submitModification() {
            closeModifyModal();

            // 只发送一次请求，带上 modified_plan
            try {
                const response = await fetch(API_BASE + '/api/approve', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        session_id: currentSessionId,
                        approved: false,  // 标记为修改，需要重新审核
                        modified_plan: currentPlan
                    })
                });

                const data = await response.json();
                updateMessages(data.messages);
                updateState(data.state);
                showActionButtons(data.waiting_for_approval);
            } catch (error) {
                alert('修改失败: ' + error.message);
            }
        }

        // 关闭弹窗
        function closeModifyModal() {
            document.getElementById('modifyModal').style.display = 'none';
        }
    </script>
</body>
</html>
