<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LangGraph 节点级流式输出示例</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 20px;
            font-size: 28px;
        }

        .controls {
            text-align: center;
            margin-bottom: 20px;
        }

        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.4);
        }

        button:hover {
            background: #45a049;
            transform: translateY(-2px);
        }

        button:disabled {
            background: #999;
            cursor: not-allowed;
            transform: none;
        }

        .workflow-visual {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .workflow-steps {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .step {
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: 500;
            transition: all 0.3s;
        }

        .step.pending {
            background: #e0e0e0;
            color: #666;
        }

        .step.running {
            background: #fff3cd;
            color: #856404;
            animation: pulse 1s infinite;
        }

        .step.completed {
            background: #d4edda;
            color: #155724;
        }

        .step.error {
            background: #f8d7da;
            color: #721c24;
        }

        .arrow {
            color: #666;
            font-size: 20px;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .output-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .node-output {
            background: white;
            border-radius: 15px;
            padding: 20px;
            min-height: 200px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .node-output h3 {
            color: #333;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #eee;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }

        .status-dot.pending { background: #999; }
        .status-dot.running { background: #ffc107; animation: blink 0.5s infinite; }
        .status-dot.completed { background: #4CAF50; }
        .status-dot.error { background: #f44336; }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .node-content {
            color: #333;
            line-height: 1.6;
            font-size: 14px;
            word-wrap: break-word;
        }

        .token {
            display: inline;
        }

        .node-content.streaming .token:last-child::after {
            content: '';
            animation: cursor 0.7s infinite;
        }

        @keyframes cursor {
            0%, 50% { border-right: 2px solid #333; }
            51%, 100% { border-right: none; }
        }

        .log-container {
            background: #1e1e1e;
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .log-container h3 {
            color: #aaa;
            margin-bottom: 10px;
        }

        .log-content {
            color: #0f0;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 200px;
            overflow-y: auto;
        }

        .log-entry {
            margin: 5px 0;
        }

        .log-entry.node_start { color: #ffeb3b; }
        .log-entry.token { color: #4CAF50; }
        .log-entry.node_end { color: #2196F3; }
        .log-entry.error { color: #f44336; }
        .log-entry.workflow_end { color: #fff; }

        .info {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            color: rgba(255, 255, 255, 0.9);
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>LangGraph 节点级流式输出示例</h1>

        <div class="info">
            <p>本示例展示如何在 LangGraph 中实现节点级别的 token 流式输出</p>
            <p>点击下方按钮开始执行工作流，观察每个节点的流式输出效果</p>
        </div>

        <div class="controls">
            <button id="startBtn" onclick="startStream()">开始执行工作流</button>
        </div>

        <div class="workflow-visual">
            <div class="workflow-steps">
                <div class="step pending" id="step-node_a">节点 A (文本处理)</div>
                <span class="arrow">→</span>
                <div class="step pending" id="step-node_b">节点 B (LLM生成)</div>
                <span class="arrow">→</span>
                <div class="step pending" id="step-node_c">节点 C (写诗)</div>
            </div>
        </div>

        <div class="output-container">
            <div class="node-output">
                <h3><span class="status-dot pending" id="dot-node_a"></span>节点 A</h3>
                <div class="node-content" id="content-node_a">等待执行...</div>
            </div>
            <div class="node-output">
                <h3><span class="status-dot pending" id="dot-node_b"></span>节点 B</h3>
                <div class="node-content" id="content-node_b">等待执行...</div>
            </div>
            <div class="node-output">
                <h3><span class="status-dot pending" id="dot-node_c"></span>节点 C</h3>
                <div class="node-content" id="content-node_c">等待执行...</div>
            </div>
        </div>

        <div class="log-container">
            <h3>事件日志</h3>
            <div class="log-content" id="logContent"></div>
        </div>
    </div>

    <script>
        let eventSource = null;

        function startStream() {
            const btn = document.getElementById('startBtn');
            btn.disabled = true;
            btn.textContent = '执行中...';

            // 重置所有状态
            resetUI();

            // 连接 SSE
            eventSource = new EventSource('http://127.0.0.1:8000/stream');

            eventSource.onmessage = function(event) {
                const data = JSON.parse(event.data);
                handleEvent(data);
            };

            eventSource.onerror = function(error) {
                console.error('SSE 错误:', error);
                addLog('error', '连接断开');
                eventSource.close();
                btn.disabled = false;
                btn.textContent = '开始执行工作流';
            };
        }

        function handleEvent(data) {
            const event = data.event || data.type;

            switch(event) {
                case 'node_start':
                    setNodeStatus(data.node, 'running');
                    addLog('node_start', `[${data.node}] ${data.message}`);
                    break;

                case 'token':
                    appendToken(data.node, data.token);
                    addLog('token', `[${data.node}] token: "${data.token}"`);
                    break;

                case 'node_end':
                    setNodeStatus(data.node, 'completed');
                    addLog('node_end', `[${data.node}] 完成`);
                    break;

                case 'error':
                    setNodeStatus(data.node || 'unknown', 'error');
                    addLog('error', `[错误] ${data.message}`);
                    break;

                case 'workflow_end':
                    addLog('workflow_end', '工作流执行完成!');
                    document.getElementById('startBtn').disabled = false;
                    document.getElementById('startBtn').textContent = '重新执行';
                    if (eventSource) {
                        eventSource.close();
                    }
                    break;
            }
        }

        function setNodeStatus(node, status) {
            const step = document.getElementById(`step-${node}`);
            const dot = document.getElementById(`dot-${node}`);
            const content = document.getElementById(`content-${node}`);

            if (step) {
                step.className = `step ${status}`;
            }
            if (dot) {
                dot.className = `status-dot ${status}`;
            }

            if (status === 'running') {
                content.className = 'node-content streaming';
                content.textContent = '';
            } else if (status === 'completed') {
                content.className = 'node-content';
            }
        }

        function appendToken(node, token) {
            const content = document.getElementById(`content-${node}`);
            if (content) {
                const span = document.createElement('span');
                span.className = 'token';
                span.textContent = token;
                content.appendChild(span);
            }
        }

        function addLog(type, message) {
            const logContent = document.getElementById('logContent');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;

            const time = new Date().toLocaleTimeString();
            entry.textContent = `[${time}] ${message}`;

            logContent.appendChild(entry);
            logContent.scrollTop = logContent.scrollHeight;
        }

        function resetUI() {
            // 重置所有节点状态
            ['node_a', 'node_b', 'node_c'].forEach(node => {
                const step = document.getElementById(`step-${node}`);
                const dot = document.getElementById(`dot-${node}`);
                const content = document.getElementById(`content-${node}`);

                if (step) step.className = 'step pending';
                if (dot) dot.className = 'status-dot pending';
                if (content) {
                    content.className = 'node-content';
                    content.textContent = '等待执行...';
                }
            });

            // 清空日志
            document.getElementById('logContent').innerHTML = '';
        }
    </script>
</body>
</html>
